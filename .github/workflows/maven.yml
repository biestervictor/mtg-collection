name: Java CI with Maven

on:
  push:
    branches: [ "dev" ]
  pull_request:
    branches: [ "dev" ]

permissions:
  contents: write
  security-events: write
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    services:
      mongo:
        image: mongo:6
        ports:
          - 27017:27017

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: java

      - name: Bump patch version in pom.xml
        if: github.actor != 'dependabot[bot]' && github.event_name == 'push'
        run: |
          CURRENT=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout)
          MAJOR=$(echo "$CURRENT" | cut -d. -f1)
          MINOR=$(echo "$CURRENT" | cut -d. -f2)
          PATCH=$(echo "$CURRENT" | cut -d. -f3)
          NEW_VERSION="${MAJOR}.${MINOR}.$((PATCH + 1))"
          echo "Bumping version: ${CURRENT} -> ${NEW_VERSION}"
          mvn versions:set -DnewVersion="${NEW_VERSION}" -DgenerateBackupPoms=false -q

      - name: Build with Maven
        run: mvn clean install -Dspring.profiles.active=ci

      - name: Extract version from pom.xml
        id: version
        run: |
          VERSION=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Extracted version: $VERSION"
          echo "BUILD_TIMESTAMP=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          output: results.sarif

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        if: github.actor != 'dependabot[bot]'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        if: github.actor != 'dependabot[bot]'
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          platforms: linux/arm64,linux/amd64
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.version }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:dev-${{ steps.version.outputs.version }}
          build-args: |
            VERSION=${{ steps.version.outputs.version }}
            BUILD_TIMESTAMP=${{ steps.version.outputs.BUILD_TIMESTAMP }}

      - name: Update Helm chart image tag
        if: github.actor != 'dependabot[bot]' && github.event_name == 'push'
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          echo "Updating image tag to dev-$VERSION"
          sed -i "s|tag:.*|tag: \"dev-$VERSION\"|" helmcharts/values.yaml
          cat helmcharts/values.yaml | grep "tag:"

      - name: Commit and push updated version
        if: github.actor != 'dependabot[bot]' && github.event_name == 'push'
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add pom.xml helmcharts/values.yaml
          git diff --cached --quiet || git commit -m "ci: bump to v${VERSION}, update image tag [skip ci]"
          git pull --rebase origin dev
          git push origin dev

      - name: Create Git version tag
        if: github.actor != 'dependabot[bot]' && github.event_name == 'push'
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          git tag -f "v${VERSION}" -m "Release v${VERSION}"
          git push -f origin "v${VERSION}"