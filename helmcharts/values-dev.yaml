## Dev-specific overrides

ingress:
  className: traefik
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "true"

volume:
  storageClassName: local-path
  storageClassNameEnabled: true

mtgcollection:
  ingress:
    host: mtg-dev.biester.vip
    tlsEnabled: true

mongodb:
  host: mongodb-service.treasury.svc.cluster.local
  auth: false
