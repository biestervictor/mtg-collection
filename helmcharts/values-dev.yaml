## Dev-specific overrides

ingress:
  className: traefik
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"

volume:
  storageClassName: local-path
  storageClassNameEnabled: true

mtgcollection:
  ingress:
    host: mtg-dev.biester.vip
    tlsEnabled: true

mongodb:
  host: mongodb-service.treasury.svc.cluster.local
  auth: false
