apiVersion: apps/v1
kind: Deployment
metadata:
  name: magic-collection
  namespace: magiccollection
  labels:
    app: magic-collection
spec:
  replicas: 1
  selector:
    matchLabels:
      app: magic-collection
  template:
    metadata:
      labels:
        app: magic-collection
    spec:
      imagePullSecrets:
        - name: regcred
      containers:
        - name: magic-collection
          image: ghcr.io/biestervictor/mtg-collection:latest
          ports:
            - containerPort: 8080
          env:
            - name: TZ
              value: "Europe/Berlin"
            - name: SPRING_DATA_MONGODB_URI
              value: "mongodb://mongokubitos:kubitosTiger_2026@192.168.178.141:27017/mtg-manager?authSource=admin"
            - name: SPRING_SERVLET_MULTIPART_MAX_FILE_SIZE
              value: "50MB"
            - name: SPRING_SERVLET_MULTIPART_MAX_REQUEST_SIZE
              value: "50MB"
          livenessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 15
            failureThreshold: 3
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3
            timeoutSeconds: 5
