# Actuator Health Probes (for Kubernetes liveness/readiness)
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=always
management.endpoint.health.probes.enabled=true
management.endpoint.health.group.readiness.include=mongo

# -------------------------------------------------------
# Spring Session - MongoDB backend
# Sessions survive pod restarts and scale across replicas.
# Timeout: 7 days so users don't need to re-login after deployments.
# -------------------------------------------------------
spring.session.store-type=mongodb
spring.session.timeout=604800s

# -------------------------------------------------------
# Microsoft Entra ID (Azure Active Directory) - OAuth2/OIDC
# -------------------------------------------------------
# App-Registrierung in Entra ID:
#   Redirect URI: http://localhost:8080/login/oauth2/code/azure
#
# Explizite URIs statt issuer-uri: verhindert OIDC-Discovery-Netzwerkaufruf beim Start.
spring.security.oauth2.client.registration.azure.client-id=${AZURE_CLIENT_ID:REPLACE_ME}
spring.security.oauth2.client.registration.azure.client-secret=${AZURE_CLIENT_SECRET:REPLACE_ME}
spring.security.oauth2.client.registration.azure.authorization-grant-type=authorization_code
spring.security.oauth2.client.registration.azure.redirect-uri={baseUrl}/login/oauth2/code/{registrationId}
spring.security.oauth2.client.registration.azure.scope=openid,profile,email
spring.security.oauth2.client.provider.azure.authorization-uri=\
  https://login.microsoftonline.com/${AZURE_TENANT_ID:71b67176-40e1-4d4e-80fe-9251918425b2}/oauth2/v2.0/authorize
spring.security.oauth2.client.provider.azure.token-uri=\
  https://login.microsoftonline.com/${AZURE_TENANT_ID:71b67176-40e1-4d4e-80fe-9251918425b2}/oauth2/v2.0/token
spring.security.oauth2.client.provider.azure.jwk-set-uri=\
  https://login.microsoftonline.com/${AZURE_TENANT_ID:71b67176-40e1-4d4e-80fe-9251918425b2}/discovery/v2.0/keys
spring.security.oauth2.client.provider.azure.user-info-uri=\
  https://graph.microsoft.com/oidc/userinfo
spring.security.oauth2.client.provider.azure.user-name-attribute=name

# -------------------------------------------------------
# App-User → Email mapping (set via env vars in k8s)
# APP_USER_EMAIL_VICTOR / APP_USER_EMAIL_ANDRE
# -------------------------------------------------------
app.user-email.Victor=${APP_USER_EMAIL_VICTOR:}
app.user-email.Andre=${APP_USER_EMAIL_ANDRE:}
