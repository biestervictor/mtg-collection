<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Compare Collection - MTG</title>
    <link th:href="@{/webjars/bootstrap/5.3.2/css/bootstrap.min.css}" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/tom-select@2.3.1/dist/css/tom-select.bootstrap5.min.css">
    <script src="https://cdn.jsdelivr.net/npm/tom-select@2.3.1/dist/js/tom-select.complete.min.js"></script>
    <style>
        :root { --primary-color: #1a1a2e; --secondary-color: #16213e; --accent-color: #e94560; --text-light: #f1f1f1; --border-color: #2a2a4a; }
        body { background-color: #0f0f23; color: var(--text-light); min-height: 100vh; }
        .navbar { background-color: var(--primary-color) !important; }
        .navbar-brand { font-weight: bold; color: var(--accent-color) !important; }
        .nav-link { color: var(--text-light) !important; }
        .nav-link.active { color: var(--accent-color) !important; border-bottom: 2px solid var(--accent-color); }
        .card { background-color: var(--secondary-color); border: 1px solid var(--border-color); color: var(--text-light); }
        .btn-primary { background-color: var(--accent-color); border-color: var(--accent-color); }
        .form-control, .form-select { background-color: var(--secondary-color); border: 1px solid var(--border-color); color: var(--text-light); }
        .form-control-sm { background-color: var(--secondary-color); border: 1px solid var(--border-color); color: var(--text-light); }
        footer { background-color: var(--primary-color); color: #888; }

        /* Card grid — normal mode */
        .card-list         { display: flex; flex-wrap: wrap; gap: .75rem; }
        .card-item         { width: 150px; cursor: default; }
        .card-item.small   { width: 80px; }
        .card-item img     { width: 100%; border-radius: 5px; display: block; }
        .card-item .name   { font-size: .7rem; color: #ccc; margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .card-item .price  { font-size: .68rem; color: #f4c430; }
        .badge-qty  { background: #333 !important; font-size:.65rem; }
        .badge-foil { background: #000 !important; color: #ffd700; font-size:.65rem; }

        /* ── Treatment-group divider (identisch zu show.html) ────── */
        .treatment-divider {
            width: 100%;                   /* forces a new flex row */
            display: flex;
            align-items: center;
            gap: 10px;
            margin: 18px 0 6px;
            font-size: 0.78rem;
            color: rgba(255,255,255,.55);
        }
        .treatment-divider:first-child { margin-top: 4px; }
        .divider-line {
            flex: 1;
            height: 1px;
            background: rgba(255,255,255,.15);
        }
        .divider-label {
            white-space: nowrap;
            color: rgba(255,255,255,.75);
            font-weight: 600;
            letter-spacing: .3px;
        }
        .divider-label .divider-count {
            font-weight: 400;
            color: rgba(255,255,255,.45);
            margin-left: 6px;
        }
        /* Text-Mode: Divider als Tabellenzeile */
        .text-table tr.divider-row td {
            border-bottom: none;
            padding: 14px 8px 4px;
            color: rgba(255,255,255,.75);
            font-weight: 600;
            font-size: .78rem;
            letter-spacing: .3px;
            background: transparent;
        }
        .text-table tr.divider-row td .divider-count {
            font-weight: 400;
            color: rgba(255,255,255,.45);
            margin-left: 6px;
        }

        /* Text table */
        .text-table { width: 100%; border-collapse: collapse; font-size: .82rem; }
        .text-table th { color: #888; font-weight: 600; padding: 4px 8px; border-bottom: 1px solid #2a2a4a; white-space: nowrap; }
        .text-table td { padding: 4px 8px; border-bottom: 1px solid #1a1a2e; vertical-align: middle; }
        .text-table tr:hover td { background: rgba(255,255,255,.04); }
        .col-header { background: var(--primary-color); border-bottom: 2px solid var(--accent-color) !important; padding: 8px 12px !important; }
        .price-col { color: #f4c430; white-space: nowrap; }

        /* ── Tom Select dark theme overrides ───────────────────── */
        .ts-wrapper { font-size: 0.85rem; }
        .ts-wrapper .ts-control,
        .ts-wrapper.single .ts-control,
        .ts-wrapper.multi .ts-control {
            background: var(--secondary-color) !important;
            border: 1px solid var(--border-color) !important;
            color: var(--text-light) !important;
        }
        .ts-wrapper.focus .ts-control { border-color: var(--accent-color) !important; box-shadow: none !important; }
        .ts-wrapper .ts-control input { color: var(--text-light) !important; }
        .ts-wrapper.multi .ts-control > div {
            background: var(--accent-color) !important;
            color: #fff !important;
            border: none !important;
            padding: 2px 6px !important;
            margin: 2px !important;
        }
        .ts-wrapper.multi .ts-control > div.active { background: #c5364b !important; }
        .ts-dropdown {
            background: #1e2a45 !important;
            border: 1px solid var(--border-color) !important;
            color: var(--text-light) !important;
            margin-top: 2px !important;
        }
        .ts-dropdown .option { padding: 7px 12px !important; color: var(--text-light) !important; }
        .ts-dropdown .option.active,
        .ts-dropdown .option:hover { background: var(--accent-color) !important; color: #fff !important; }
        .ts-dropdown .option.selected { background: rgba(233,69,96,0.25) !important; }
        .ts-set-icon { width: 16px; height: 16px; filter: invert(0.7); margin-right: 6px; vertical-align: middle; }

        /* ── Set Accordion ─────────────────────────────────────── */
        .set-accordion .accordion-item {
            background: var(--secondary-color);
            border: 1px solid var(--border-color);
            margin-bottom: 12px;
            border-radius: 8px;
            overflow: hidden;
        }
        .set-accordion .accordion-button {
            background: var(--primary-color);
            color: var(--text-light);
            font-weight: 600;
            padding: 12px 16px;
        }
        .set-accordion .accordion-button:not(.collapsed) {
            background: linear-gradient(90deg, var(--primary-color), #1d1d3d);
            color: var(--accent-color);
            box-shadow: inset 0 -2px 0 var(--accent-color);
        }
        .set-accordion .accordion-button:focus { box-shadow: none; border-color: var(--border-color); }
        .set-accordion .accordion-button::after { filter: invert(1); }
        .set-accordion .accordion-body { background: #14142a; padding: 16px; }
        .set-accordion .accordion-header-icon { width: 22px; height: 22px; filter: invert(0.85); margin-right: 10px; }
        .set-accordion .badge-set-count { background: rgba(255,255,255,.1); color: var(--text-light); font-weight: 500; font-size: .72rem; margin-left: 8px; }
        .set-accordion .badge-set-user { background: var(--accent-color); }

        /* Token/Promo sub-card inside accordion body */
        .subset-card { background: rgba(255,255,255,.03); border: 1px dashed rgba(255,255,255,.1); margin-top: 14px; border-radius: 6px; padding: 12px; }
        .subset-card-header { font-size: .85rem; color: rgba(255,255,255,.7); margin-bottom: 10px; }
        .subset-card-header .icon-token { color: #f4c430; }
        .subset-card-header .icon-promo { color: #6dd5fa; }

        /* ── Trade Wizard ──────────────────────────────────────── */
        .wizard-card { background: linear-gradient(135deg, #16213e, #1a1a2e); border: 1px solid var(--accent-color); border-radius: 10px; padding: 16px; margin-bottom: 20px; }
        .wizard-card h5 { color: var(--accent-color); }
        .wizard-controls { display: flex; flex-wrap: wrap; gap: 16px; align-items: end; }
        .wizard-controls > div { flex: 0 0 auto; }
        .wizard-controls .form-range { width: 180px; }
        .wizard-result { margin-top: 16px; padding-top: 16px; border-top: 1px solid var(--border-color); }
        .wizard-cols { display: grid; grid-template-columns: 1fr auto 1fr; gap: 18px; align-items: stretch; }
        .wizard-side { background: rgba(0,0,0,.25); border-radius: 6px; padding: 12px; min-height: 100px; }
        .wizard-side h6 { color: var(--text-light); border-bottom: 1px solid var(--border-color); padding-bottom: 6px; margin-bottom: 10px; font-size: .9rem; }
        .wizard-side ul { list-style: none; padding: 0; margin: 0; font-size: .82rem; }
        .wizard-side ul li { display: flex; justify-content: space-between; padding: 4px 0; border-bottom: 1px solid rgba(255,255,255,.04); }
        .wizard-side ul li .card-name { color: var(--text-light); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 220px; }
        .wizard-side ul li .card-price { color: #f4c430; white-space: nowrap; margin-left: 8px; }
        .wizard-side ul li .foil-mark { color: #ffd700; margin-left: 4px; }
        .wizard-side .sum { font-weight: 600; color: var(--accent-color); margin-top: 8px; padding-top: 8px; border-top: 1px solid var(--border-color); display: flex; justify-content: space-between; }
        .wizard-arrow { display: flex; align-items: center; justify-content: center; font-size: 1.6rem; color: var(--accent-color); }
        .wizard-badge { padding: 6px 14px; border-radius: 16px; font-size: .82rem; font-weight: 600; }
        .wizard-badge.fair       { background: #1f5e2d; color: #b9f5c5; }
        .wizard-badge.acceptable { background: #6b5b1c; color: #fff4c8; }
        .wizard-badge.unfair     { background: #6b1c1c; color: #ffc8c8; }
        .wizard-skipped { margin-top: 14px; }
        .wizard-skipped summary { cursor: pointer; color: rgba(255,255,255,.6); font-size: .82rem; }
        .wizard-skipped ul { list-style: none; padding: 8px 0 0; font-size: .78rem; color: rgba(255,255,255,.65); }
        .wizard-skipped li { padding: 2px 0; }
        .wizard-skipped .reason { color: #888; margin-left: 6px; font-style: italic; }
        .wizard-error { color: #ff8a8a; font-size: .85rem; margin-top: 10px; }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark" th:replace="~{fragments/nav :: main-nav}"></nav>
    <div th:replace="~{fragments/nav :: price-update-utils}"></div>

    <main class="container-fluid py-4 px-4">
        <h1 class="mb-4 container"><i class="bi bi-arrow-left-right"></i> Compare Collection</h1>

        <!-- ── Filter / options bar ───────────────────────────────────────── -->
        <div class="container mb-3">
          <div class="card">
            <div class="card-body py-3">
              <form method="get" th:action="@{/compare}" id="compareForm">
                <div class="row g-3 align-items-end">

                  <!-- Your User -->
                  <div class="col-md-2">
                    <label class="form-label small mb-1">Your User</label>
                    <select class="form-select form-select-sm" name="user" id="cmpUserSel" required>
                      <option value="">-- User --</option>
                      <option value="Victor" th:selected="${user == 'Victor'}">Victor</option>
                      <option value="Andre"  th:selected="${user == 'Andre'}">Andre</option>
                    </select>
                  </div>

                  <!-- Compare with -->
                  <div class="col-md-2">
                    <label class="form-label small mb-1">Compare with</label>
                    <select class="form-select form-select-sm" name="compareUser" id="cmpCompareSel" required>
                      <option value="">-- User --</option>
                      <option value="Victor" th:selected="${compareUser == 'Victor'}">Victor</option>
                      <option value="Andre"  th:selected="${compareUser == 'Andre'}">Andre</option>
                    </select>
                  </div>

                  <!-- Sets (multi-select) -->
                  <div class="col-md-5">
                    <label class="form-label small mb-1">
                      Sets <span class="text-muted small">(mehrere wählbar)</span>
                    </label>
                    <select id="setMultiSelect" name="sets" multiple
                            placeholder="Sets suchen und auswählen …">
                      <option th:each="s : ${sets}"
                              th:value="${s.setCode}"
                              th:data-icon="${s.icon}"
                              th:selected="${selectedSets != null and #lists.contains(selectedSets, s.setCode)}"
                              th:text="${s.setCode + ' — ' + s.name}">
                        XXX
                      </option>
                    </select>
                  </div>

                  <!-- Submit -->
                  <div class="col-md-auto">
                    <button type="submit" class="btn btn-primary btn-sm">
                      <i class="bi bi-search"></i> Compare
                    </button>
                  </div>

                  <!-- Divider -->
                  <div class="col-12 d-none d-md-block border-top border-secondary mt-1 mb-1"></div>

                  <!-- Only tradable — Your User -->
                  <div class="col-auto d-flex align-items-center gap-2">
                    <div class="form-check form-switch mb-0">
                      <input class="form-check-input" type="checkbox" name="onlyTradableUser"
                             value="true" id="chkTradableUser"
                             th:checked="${onlyTradableUser}"
                             onchange="submitCompareForm()">
                      <label class="form-check-label small" for="chkTradableUser">
                        Only tradable <span class="text-muted">(Your User, ≥2)</span>
                      </label>
                    </div>
                  </div>

                  <!-- Only tradable — Compare User -->
                  <div class="col-auto d-flex align-items-center gap-2">
                    <div class="form-check form-switch mb-0">
                      <input class="form-check-input" type="checkbox" name="onlyTradableCompare"
                             value="true" id="chkTradableCompare"
                             th:checked="${onlyTradableCompare}"
                             onchange="submitCompareForm()">
                      <label class="form-check-label small" for="chkTradableCompare">
                        Only tradable <span class="text-muted">(Compare, ≥2)</span>
                      </label>
                    </div>
                  </div>

                  <!-- Show Tokens -->
                  <div class="col-auto d-flex align-items-center gap-2">
                    <div class="form-check form-switch mb-0">
                      <input class="form-check-input" type="checkbox" name="showTokens"
                             value="true" id="chkShowTokens"
                             th:checked="${showTokens == 'true'}"
                             onchange="submitCompareForm()">
                      <label class="form-check-label small" for="chkShowTokens">
                        <i class="bi bi-stars"></i> Show Tokens
                      </label>
                    </div>
                  </div>

                  <!-- Show Promos -->
                  <div class="col-auto d-flex align-items-center gap-2">
                    <div class="form-check form-switch mb-0">
                      <input class="form-check-input" type="checkbox" name="showPromos"
                             value="true" id="chkShowPromos"
                             th:checked="${showPromos == 'true'}"
                             onchange="submitCompareForm()">
                      <label class="form-check-label small" for="chkShowPromos">
                        <i class="bi bi-gem"></i> Show Promos
                      </label>
                    </div>
                  </div>

                  <!-- View mode -->
                  <div class="col-auto ms-md-auto">
                    <div class="btn-group btn-group-sm" role="group">
                      <input type="radio" class="btn-check" name="viewMode" id="vmNormal" value="normal"
                             th:checked="${viewMode == 'normal'}"
                             onchange="submitCompareForm()">
                      <label class="btn btn-outline-secondary" for="vmNormal"><i class="bi bi-grid-3x3-gap"></i> Normal</label>

                      <input type="radio" class="btn-check" name="viewMode" id="vmSmall" value="small"
                             th:checked="${viewMode == 'small'}"
                             onchange="submitCompareForm()">
                      <label class="btn btn-outline-secondary" for="vmSmall"><i class="bi bi-grid-fill"></i> Small</label>

                      <input type="radio" class="btn-check" name="viewMode" id="vmText" value="text"
                             th:checked="${viewMode == 'text'}"
                             onchange="submitCompareForm()">
                      <label class="btn btn-outline-secondary" for="vmText"><i class="bi bi-list-ul"></i> Text</label>
                    </div>
                  </div>

                  <!-- Hidden: keep checkbox state (unchecked = absent in GET → needs false sentinel) -->
                  <!-- Handled in JS below -->
                </div>
              </form>
            </div>
          </div>
        </div>

        <!-- ── Trade Wizard ─────────────────────────────────────────────────── -->
        <div th:if="${setResults != null and not #maps.isEmpty(setResults)}" class="container">
          <div class="wizard-card">
            <h5 class="mb-3"><i class="bi bi-magic"></i> Trade Wizard</h5>
            <div class="wizard-controls">
              <div>
                <label class="form-label small mb-1 text-muted">Modus</label>
                <div class="btn-group btn-group-sm" role="group" id="wizardModeGroup">
                  <input type="radio" class="btn-check" name="wizardMode" id="wmGreedy" value="greedy" checked>
                  <label class="btn btn-outline-light" for="wmGreedy">
                    <i class="bi bi-arrow-left-right"></i> 1-zu-1
                  </label>
                  <input type="radio" class="btn-check" name="wizardMode" id="wmBundle" value="bundle">
                  <label class="btn btn-outline-light" for="wmBundle">
                    <i class="bi bi-boxes"></i> Bundle (n:m)
                  </label>
                </div>
              </div>

              <div>
                <label for="wizardTolerance" class="form-label small mb-1 text-muted">
                  Toleranz <span id="toleranceLabel">15</span>%
                </label>
                <input type="range" class="form-range" id="wizardTolerance" min="1" max="50" value="15">
              </div>

              <div>
                <label for="wizardMinValue" class="form-label small mb-1 text-muted">Mindestwert pro Karte (€)</label>
                <input type="number" class="form-control form-control-sm" id="wizardMinValue"
                       value="0.50" min="0" max="1000" step="0.10" style="width: 110px;">
              </div>

              <div>
                <button type="button" class="btn btn-primary btn-sm" id="wizardRunBtn">
                  <i class="bi bi-calculator"></i> Trade berechnen
                </button>
              </div>
            </div>

            <div id="wizardResult" class="wizard-result" style="display:none;"></div>
            <div id="wizardError" class="wizard-error" style="display:none;"></div>
          </div>
        </div>

        <!-- ── Results: Accordion per Set ────────────────────────────────────── -->
        <div th:if="${setResults != null and not #maps.isEmpty(setResults)}" class="container">
          <div class="accordion set-accordion" id="setAccordion">
            <div th:each="entry, iter : ${setResults}"
                 th:with="setCode=${entry.key},
                          diff=${entry.value},
                          tokenDiff=${tokenResults != null ? tokenResults.get(setCode) : null},
                          promoDiff=${promoResults != null ? promoResults.get(setCode) : null},
                          setObj=${setsByCode != null ? setsByCode.get(setCode) : null},
                          expanded=${#maps.size(setResults) == 1}"
                 class="accordion-item">

              <h2 class="accordion-header" th:id="'h-' + ${setCode}">
                <button type="button" class="accordion-button"
                        th:classappend="${expanded} ? '' : 'collapsed'"
                        data-bs-toggle="collapse"
                        th:attr="data-bs-target='#body-' + ${setCode},
                                 aria-controls='body-' + ${setCode}"
                        th:aria-expanded="${expanded}">
                  <img th:if="${setObj != null and setObj.icon != null}"
                       th:src="${setObj.icon}"
                       class="accordion-header-icon" alt=""
                       onerror="this.style.display='none'">
                  <span class="me-2" th:text="${setCode?.toUpperCase()}">SET</span>
                  <span class="text-muted small me-2" th:if="${setObj != null}" th:text="${setObj.name}">Name</span>
                  <span class="badge badge-set-count badge-set-user ms-auto me-1"
                        th:text="${#lists.size(diff.onlyUser)} + ' nur ' + ${user}">x</span>
                  <span class="badge badge-set-count me-2"
                        th:text="${#lists.size(diff.onlyCompare)} + ' nur ' + ${compareUser}">x</span>
                </button>
              </h2>

              <div th:id="'body-' + ${setCode}"
                   class="accordion-collapse collapse"
                   th:classappend="${expanded} ? 'show' : ''"
                   th:attr="aria-labelledby='h-' + ${setCode}"
                   data-bs-parent="#setAccordion">
                <div class="accordion-body">

                  <!-- Main diff: two columns -->
                  <div class="row gx-3">
                    <div class="col-md-6 mb-3">
                      <div th:replace="~{fragments/compare-diff :: diff-column(
                          title=${user + ' — only here'},
                          iconClass='bi bi-person-fill',
                          cards=${diff.onlyUser},
                          dividers=${diff.userDividers},
                          viewMode=${viewMode},
                          showPrice=true,
                          emptyMessage='No unique cards')}"></div>
                    </div>
                    <div class="col-md-6 mb-3">
                      <div th:replace="~{fragments/compare-diff :: diff-column(
                          title=${compareUser + ' — only here'},
                          iconClass='bi bi-person',
                          cards=${diff.onlyCompare},
                          dividers=${diff.compareDividers},
                          viewMode=${viewMode},
                          showPrice=true,
                          emptyMessage='No unique cards')}"></div>
                    </div>
                  </div>

                  <!-- Token sub-section -->
                  <div th:if="${tokenDiff != null}" class="subset-card">
                    <div class="subset-card-header">
                      <i class="bi bi-stars icon-token"></i>
                      Token-Karten zu <strong th:text="${setCode?.toUpperCase()}">SET</strong>
                    </div>
                    <div class="row gx-2">
                      <div class="col-md-6 mb-2">
                        <div th:replace="~{fragments/compare-diff :: diff-column(
                            title=${'Tokens nur bei ' + user},
                            iconClass='bi bi-person-fill text-warning',
                            cards=${tokenDiff.onlyUser},
                            dividers=${tokenDiff.userDividers},
                            viewMode=${viewMode},
                            showPrice=false,
                            emptyMessage='Keine einzigartigen Tokens')}"></div>
                      </div>
                      <div class="col-md-6 mb-2">
                        <div th:replace="~{fragments/compare-diff :: diff-column(
                            title=${'Tokens nur bei ' + compareUser},
                            iconClass='bi bi-people-fill text-warning',
                            cards=${tokenDiff.onlyCompare},
                            dividers=${tokenDiff.compareDividers},
                            viewMode=${viewMode},
                            showPrice=false,
                            emptyMessage='Keine einzigartigen Tokens')}"></div>
                      </div>
                    </div>
                  </div>

                  <!-- Promo sub-section -->
                  <div th:if="${promoDiff != null}" class="subset-card">
                    <div class="subset-card-header">
                      <i class="bi bi-gem icon-promo"></i>
                      Promo-Karten zu <strong th:text="${setCode?.toUpperCase()}">SET</strong>
                    </div>
                    <div class="row gx-2">
                      <div class="col-md-6 mb-2">
                        <div th:replace="~{fragments/compare-diff :: diff-column(
                            title=${'Promos nur bei ' + user},
                            iconClass='bi bi-person-fill text-info',
                            cards=${promoDiff.onlyUser},
                            dividers=${promoDiff.userDividers},
                            viewMode=${viewMode},
                            showPrice=true,
                            emptyMessage='Keine einzigartigen Promos')}"></div>
                      </div>
                      <div class="col-md-6 mb-2">
                        <div th:replace="~{fragments/compare-diff :: diff-column(
                            title=${'Promos nur bei ' + compareUser},
                            iconClass='bi bi-people-fill text-info',
                            cards=${promoDiff.onlyCompare},
                            dividers=${promoDiff.compareDividers},
                            viewMode=${viewMode},
                            showPrice=true,
                            emptyMessage='Keine einzigartigen Promos')}"></div>
                      </div>
                    </div>
                  </div>

                </div>
              </div>
            </div>
          </div>
        </div>
    </main>

    <footer class="text-center py-3 mt-4"><p>MTG Collection Manager</p></footer>

    <script th:src="@{/webjars/bootstrap/5.3.2/js/bootstrap.bundle.min.js}"></script>
    <script th:inline="javascript">
        // _serverAppUser is already declared by the price-update-utils fragment
        const _selectedUser   = /*[[${user}]]*/ null;
        const _compareUserSrv = /*[[${compareUser}]]*/ null;

        let setSelect = null; // Tom Select instance

        document.addEventListener('DOMContentLoaded', function () {
            // ── Tom Select: multi-set picker with icons ────────────────
            const selectEl = document.getElementById('setMultiSelect');
            if (selectEl && typeof TomSelect !== 'undefined') {
                // Build icon lookup BEFORE init (Tom Select rewrites the DOM)
                const iconMap = {};
                Array.from(selectEl.querySelectorAll('option')).forEach(function (opt) {
                    if (opt.value) iconMap[opt.value] = opt.getAttribute('data-icon') || '';
                });

                setSelect = new TomSelect('#setMultiSelect', {
                    plugins: ['remove_button'],
                    valueField: 'value',
                    labelField: 'text',
                    searchField: ['text', 'value'],
                    maxOptions: null,
                    placeholder: 'Sets suchen und auswählen …',
                    render: {
                        option: function (data, escape) {
                            const icon = iconMap[data.value];
                            const iconHtml = icon
                                ? '<img class="ts-set-icon" src="' + escape(icon) + '" onerror="this.style.display=\'none\'">'
                                : '';
                            return '<div>' + iconHtml + escape(data.text) + '</div>';
                        },
                        item: function (data, escape) {
                            const icon = iconMap[data.value];
                            const iconHtml = icon
                                ? '<img class="ts-set-icon" src="' + escape(icon) + '" onerror="this.style.display=\'none\'">'
                                : '';
                            return '<div>' + iconHtml + escape(data.value.toUpperCase()) + '</div>';
                        }
                    }
                });
            }

            // ── Auto-fill user from server (Entra ID) ──────────────────
            if (typeof _serverAppUser !== 'undefined' && _serverAppUser && !_selectedUser) {
                const sel = document.getElementById('cmpUserSel');
                if (sel && sel.querySelector('option[value="' + _serverAppUser + '"]')) {
                    sel.value = _serverAppUser;
                }
            }

            // ── Checkbox: unchecked must submit "false" explicitly ─────
            const form = document.getElementById('compareForm');
            if (form) form.addEventListener('submit', _fixCheckboxes);

            // ── Trade Wizard wiring ────────────────────────────────────
            const wizardBtn = document.getElementById('wizardRunBtn');
            if (wizardBtn) wizardBtn.addEventListener('click', runWizard);

            const toleranceSlider = document.getElementById('wizardTolerance');
            const toleranceLabel  = document.getElementById('toleranceLabel');
            if (toleranceSlider && toleranceLabel) {
                toleranceSlider.addEventListener('input', function () {
                    toleranceLabel.textContent = this.value;
                });
            }
        });

        // ── Checkbox fix for GET forms ─────────────────────────────────
        function _fixCheckboxes() {
            const form = document.getElementById('compareForm');
            if (!form) return;
            ['onlyTradableUser', 'onlyTradableCompare', 'showTokens', 'showPromos'].forEach(function (name) {
                form.querySelectorAll('input[type="hidden"][name="' + name + '"]')
                    .forEach(function (el) { el.remove(); });
                const cb = document.querySelector('input[name="' + name + '"]');
                if (cb && !cb.checked) {
                    const hidden = document.createElement('input');
                    hidden.type  = 'hidden';
                    hidden.name  = name;
                    hidden.value = 'false';
                    form.appendChild(hidden);
                }
            });
        }

        // Auto-submit when viewMode or tradable toggles change
        function submitCompareForm() {
            const user        = document.getElementById('cmpUserSel').value;
            const compareUser = document.getElementById('cmpCompareSel').value;
            const sets        = setSelect ? setSelect.getValue() : [];
            if (!user || !compareUser || !sets.length) return;
            _fixCheckboxes();
            document.getElementById('compareForm').submit();
        }

        // ── Trade Wizard ───────────────────────────────────────────────
        async function runWizard() {
            const resultEl = document.getElementById('wizardResult');
            const errorEl  = document.getElementById('wizardError');
            const btn      = document.getElementById('wizardRunBtn');

            errorEl.style.display = 'none';
            errorEl.textContent = '';
            resultEl.style.display = 'none';
            resultEl.innerHTML = '';

            const userA = _selectedUser
                || (document.getElementById('cmpUserSel') ? document.getElementById('cmpUserSel').value : null);
            const userB = _compareUserSrv
                || (document.getElementById('cmpCompareSel') ? document.getElementById('cmpCompareSel').value : null);
            const sets  = setSelect ? setSelect.getValue() : [];
            const modeEl = document.querySelector('input[name="wizardMode"]:checked');
            const mode   = modeEl ? modeEl.value : 'greedy';
            const tolerancePercent = parseInt(document.getElementById('wizardTolerance').value, 10);
            const minCardValue     = parseFloat(document.getElementById('wizardMinValue').value);

            if (!userA || !userB) { showWizardError('Bitte beide User auswählen.'); return; }
            if (userA === userB)  { showWizardError('Bitte zwei verschiedene User auswählen.'); return; }
            if (!sets.length)     { showWizardError('Bitte mindestens ein Set auswählen.'); return; }

            const origHtml = btn.innerHTML;
            btn.disabled = true;
            btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2" role="status"></span>Berechne …';

            try {
                const resp = await fetch('/api/compare/trade-wizard', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
                    body: JSON.stringify({
                        userA: userA,
                        userB: userB,
                        sets: sets,
                        mode: mode,
                        tolerancePercent: tolerancePercent,
                        minCardValue: isNaN(minCardValue) ? 0 : minCardValue
                    })
                });
                if (!resp.ok) {
                    let detail = 'HTTP ' + resp.status;
                    try {
                        const err = await resp.json();
                        if (err && err.detail) detail = err.detail;
                        else if (err && err.title) detail = err.title;
                    } catch (e) { /* non-JSON error body */ }
                    throw new Error(detail);
                }
                const data = await resp.json();
                renderWizardResult(data, userA, userB);
            } catch (e) {
                showWizardError('Fehler: ' + (e.message || e));
            } finally {
                btn.disabled = false;
                btn.innerHTML = origHtml;
            }
        }

        function showWizardError(msg) {
            const errorEl = document.getElementById('wizardError');
            errorEl.textContent = msg;
            errorEl.style.display = 'block';
        }

        function escapeHtml(s) {
            if (s == null) return '';
            return String(s)
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;');
        }

        function fairnessClass(score) {
            if (score >= 0.95) return 'fair';
            if (score >= 0.80) return 'acceptable';
            return 'unfair';
        }
        function fairnessLabel(score) {
            if (score >= 0.95) return 'Fair';
            if (score >= 0.80) return 'Akzeptabel';
            return 'Unfair';
        }
        function fmtEur(v) {
            if (v == null || isNaN(v)) return '–';
            return '€' + Number(v).toFixed(2);
        }

        function renderCardLine(card) {
            const foilMark = card && card.foil ? ' <span class="foil-mark" title="Foil">✦</span>' : '';
            const setLbl = card && card.setCode ? escapeHtml(card.setCode.toUpperCase()) + ' · ' : '';
            const name   = escapeHtml(card ? card.name : '');
            const price  = card ? fmtEur(card.price) : '–';
            return '<li>'
                + '<span class="card-name">' + setLbl + name + foilMark + '</span>'
                + '<span class="card-price">' + price + '</span>'
                + '</li>';
        }

        function renderSkipped(list, title) {
            if (!list || !list.length) return '';
            const items = list.map(function (s) {
                const c = s.card || {};
                const reason = s.reason ? ' <span class="reason">(' + escapeHtml(s.reason) + ')</span>' : '';
                return '<li>' + escapeHtml(c.name || '?') + reason + '</li>';
            }).join('');
            return '<details class="wizard-skipped">'
                + '<summary>' + escapeHtml(title) + ' (' + list.length + ')</summary>'
                + '<ul>' + items + '</ul>'
                + '</details>';
        }

        function renderWizardResult(data, userA, userB) {
            const resultEl = document.getElementById('wizardResult');

            let cardsA = [], cardsB = [];
            if (data.mode === 'greedy') {
                const pairs = data.pairs || [];
                cardsA = pairs.map(function (p) { return p.fromA; }).filter(Boolean);
                cardsB = pairs.map(function (p) { return p.fromB; }).filter(Boolean);
            } else {
                const b = data.bundle || {};
                cardsA = b.aSide || [];
                cardsB = b.bSide || [];
            }

            const sumA   = data.totalA != null ? data.totalA : 0;
            const sumB   = data.totalB != null ? data.totalB : 0;
            const score  = data.fairnessScore != null ? data.fairnessScore : 0;
            const fClass = fairnessClass(score);
            const fLabel = fairnessLabel(score);
            const diff   = data.diff != null ? data.diff : Math.abs(sumA - sumB);

            const linesA = cardsA.length
                ? cardsA.map(renderCardLine).join('')
                : '<li class="text-muted">– keine Karten –</li>';
            const linesB = cardsB.length
                ? cardsB.map(renderCardLine).join('')
                : '<li class="text-muted">– keine Karten –</li>';

            const notes = (data.notes && data.notes.length)
                ? '<div class="text-muted small mt-2"><i class="bi bi-info-circle"></i> '
                  + data.notes.map(escapeHtml).join(' · ') + '</div>'
                : '';

            const skipped = renderSkipped(data.skippedA, 'Übersprungen (' + userA + ')')
                          + renderSkipped(data.skippedB, 'Übersprungen (' + userB + ')');

            const modeHeader = data.mode === 'greedy'
                ? '<i class="bi bi-arrow-left-right"></i> 1-zu-1 Trades (' + (data.pairs ? data.pairs.length : 0) + ')'
                : '<i class="bi bi-boxes"></i> Bundle Vorschlag';

            resultEl.innerHTML =
                '<div class="d-flex justify-content-between align-items-center flex-wrap gap-2 mb-3">'
              + '  <h6 class="mb-0">' + modeHeader + '</h6>'
              + '  <span class="wizard-badge ' + fClass + '">'
              + '    ' + fLabel + ' · Score ' + (score * 100).toFixed(0) + '% · Δ ' + fmtEur(diff)
              + '  </span>'
              + '</div>'
              + '<div class="wizard-cols">'
              + '  <div class="wizard-side">'
              + '    <h6><i class="bi bi-arrow-up-circle"></i> ' + escapeHtml(userA) + ' gibt</h6>'
              + '    <ul>' + linesA + '</ul>'
              + '    <div class="sum"><span>Summe</span><span>' + fmtEur(sumA) + '</span></div>'
              + '  </div>'
              + '  <div class="wizard-arrow"><i class="bi bi-arrow-left-right"></i></div>'
              + '  <div class="wizard-side">'
              + '    <h6><i class="bi bi-arrow-down-circle"></i> ' + escapeHtml(userB) + ' gibt</h6>'
              + '    <ul>' + linesB + '</ul>'
              + '    <div class="sum"><span>Summe</span><span>' + fmtEur(sumB) + '</span></div>'
              + '  </div>'
              + '</div>'
              + notes
              + skipped;

            resultEl.style.display = 'block';
        }
    </script>
</body>
</html>
