<th:block xmlns:th="http://www.thymeleaf.org">
    <th:block th:fragment="nav-styles">
        <style>
            .env-badge {
                display: inline-block;
                padding: 2px 10px;
                border-radius: 4px;
                font-size: 0.75em;
                font-weight: bold;
                letter-spacing: 0.5px;
                margin-right: 8px;
                vertical-align: middle;
            }
            .env-badge-prod {
                background: #e74c3c;
                color: #fff;
            }
            .env-badge-dev {
                background: #27ae60;
                color: #fff;
            }
            .version-info {
                font-size: 0.7em;
                color: #888;
                white-space: nowrap;
            }
        </style>
    </th:block>

    <nav th:fragment="main-nav" class="navbar navbar-expand-lg navbar-dark" style="display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap;">
        <div class="container-fluid">
            <a class="navbar-brand" th:href="@{/}">
                <i class="bi bi-collection"></i> MTG Collection Manager
            </a>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item">
                        <a class="nav-link" th:classappend="${currentUri == '/' ? 'active' : ''}" th:href="@{/}">Home</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/import}">Import</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/show}">Show</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/compare}">Compare</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/statistics}">Statistics</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/deck-suggest}">Deck Suggest</a>
                    </li>
                </ul>
                <ul class="navbar-nav">
                    <li class="nav-item">
                        <form class="d-flex" th:action="@{/search}" method="get">
                            <input class="form-control form-control-sm me-2" type="search" name="q" placeholder="Card search..." aria-label="Search">
                            <button class="btn btn-sm btn-outline-light" type="submit"><i class="bi bi-search"></i></button>
                        </form>
                    </li>
                </ul>
            </div>
        </div>
        <div class="version-info">
            <span th:if="${isProd}" class="env-badge env-badge-prod">PROD</span>
            <span th:unless="${isProd}" class="env-badge env-badge-dev">DEV</span>
            <span th:text="${mongoHost}" style="margin-right: 10px;"></span>
            <span th:if="${not #strings.isEmpty(buildTimestamp)}">· v<span th:text="${appVersion}"></span> · <span th:text="${buildTimestamp}"></span></span>
        </div>
    </nav>
</th:block>
