<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Collection Importer - MTG</title>
    <link th:href="@{/webjars/bootstrap/5.3.2/css/bootstrap.min.css}" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        :root { --primary-color: #1a1a2e; --secondary-color: #16213e; --accent-color: #e94560; --text-light: #f1f1f1; }
        body { background-color: #0f0f23; color: var(--text-light); min-height: 100vh; }
        .navbar { background-color: var(--primary-color) !important; }
        .navbar-brand { font-weight: bold; color: var(--accent-color) !important; }
        .nav-link { color: var(--text-light) !important; }
        .nav-link.active { color: var(--accent-color) !important; border-bottom: 2px solid var(--accent-color); }
        .card { background-color: var(--secondary-color); border: 1px solid #2a2a4a; color: var(--text-light); }
        .btn-primary { background-color: var(--accent-color); border-color: var(--accent-color); }
        .form-control, .form-select { background-color: var(--secondary-color); border: 1px solid #2a2a4a; color: var(--text-light); }
        footer { background-color: var(--primary-color); color: #888; }
        .stat-value { font-size: 1.8rem; font-weight: bold; color: var(--accent-color); }
        .stat-label { color: #888; font-size: 0.85rem; }
        #jobStatusPanel { display: none; }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark" th:replace="~{fragments/nav :: main-nav}"></nav>
    <div th:replace="~{fragments/nav :: price-update-utils}"></div>

    <main class="container py-4">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h1 class="mb-0"><i class="bi bi-upload"></i> Collection Importer</h1>
            <a th:href="@{/import/history}" class="btn btn-outline-light">
                <i class="bi bi-clock-history"></i> View History
            </a>
        </div>

        <!-- Import Form -->
        <div class="row mb-4">
            <div class="col-md-8">
                <div class="card">
                    <div class="card-header"><h5 class="mb-0">Import Options</h5></div>
                    <div class="card-body">
                        <form id="importForm" enctype="multipart/form-data">
                            <div class="row g-3">
                                <div class="col-md-4">
                                    <label class="form-label">User</label>
                                    <select class="form-select" name="user" id="importUserSelect" required>
                                        <option value="">-- Select User --</option>
                                        <option value="Andre">Andre</option>
                                        <option value="Victor">Victor</option>
                                    </select>
                                </div>
                                <div class="col-md-4">
                                    <label class="form-label">File Format</label>
                                    <select class="form-select" name="format" required>
                                        <option value="">-- Select format --</option>
                                        <option value="inventory">Card Market Inventory (CSV)</option>
                                        <option value="dragonshield_web">Dragonshield Web</option>
                                        <option value="dragonshield_app">Dragonshield App</option>
                                    </select>
                                </div>
                                <div class="col-md-4">
                                    <label class="form-label">CSV File</label>
                                    <input type="file" class="form-control" name="file" accept=".csv" required>
                                </div>
                            </div>
                            <div class="mt-3 d-flex align-items-center gap-3">
                                <button type="submit" class="btn btn-primary" id="importSubmitBtn">
                                    <i class="bi bi-upload"></i> Upload
                                </button>
                                <div id="importSpinner" class="d-none d-flex align-items-center gap-2 text-secondary">
                                    <span class="spinner-border spinner-border-sm"></span>
                                    Uploading…
                                </div>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>

        <!-- Job Status Panel -->
        <div id="jobStatusPanel" class="row">
            <div class="col-12">
                <div class="card" id="jobStatusCard">
                    <div class="card-header d-flex align-items-center gap-2">
                        <span id="jobStatusIcon"><span class="spinner-border spinner-border-sm text-warning"></span></span>
                        <h5 class="mb-0" id="jobStatusTitle">Import läuft…</h5>
                        <span class="ms-auto text-muted small" id="jobStatusUser"></span>
                    </div>
                    <div class="card-body" id="jobStatusBody">
                        <p class="text-muted mb-0">
                            <i class="bi bi-info-circle"></i>
                            Der Import läuft im Hintergrund. Du erhältst eine Benachrichtigung im
                            <i class="bi bi-person-circle"></i> User-Menü wenn er abgeschlossen ist.
                        </p>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer class="text-center py-3 mt-4"><p>MTG Collection Manager</p></footer>

    <script th:src="@{/webjars/bootstrap/5.3.2/js/bootstrap.bundle.min.js}"></script>
    <script>
        // ── Set user select from localStorage on page load ────────────────────
        document.addEventListener('DOMContentLoaded', () => {
            const user = localStorage.getItem('navActiveUser') || 'Victor';
            const sel  = document.getElementById('importUserSelect');
            if (sel) sel.value = user;

            // If there's a running or recent job for this page session, restore it
            restoreJobStatus();
        });

        // ── Intercept form submit ─────────────────────────────────────────────
        document.getElementById('importForm').addEventListener('submit', async function(e) {
            e.preventDefault();

            const form     = e.target;
            const submitBtn = document.getElementById('importSubmitBtn');
            const spinner   = document.getElementById('importSpinner');

            submitBtn.disabled = true;
            spinner.classList.remove('d-none');

            // Immediate feedback so the user knows the upload has been accepted
            showNavToast('info', 'Import gestartet',
                'Die Datei wird verarbeitet. Du erhältst eine Benachrichtigung ' +
                'im <i class="bi bi-person-circle"></i> User-Menü wenn der Import abgeschlossen ist.');

            const formData = new FormData(form);

            try {
                const resp = await fetch('/api/import/start', {
                    method: 'POST',
                    body: formData
                });

                if (!resp.ok) {
                    const err = await resp.json().catch(() => ({ error: 'Upload fehlgeschlagen' }));
                    showNavToast('danger', 'Upload fehlgeschlagen', err.error || 'Unbekannter Fehler');
                    return;
                }

                const data = await resp.json();
                const jobId = data.jobId;
                const user  = data.user;

                // Store for navbar polling
                localStorage.setItem('navImportJob', JSON.stringify({ jobId, user }));

                // Show status panel and start local polling
                showJobRunning(user);
                startLocalPoll(jobId, user);

                // Reset form
                form.reset();
                document.getElementById('importUserSelect').value =
                    localStorage.getItem('navActiveUser') || 'Victor';

            } catch (err) {
                showNavToast('danger', 'Upload fehlgeschlagen', String(err));
            } finally {
                submitBtn.disabled = false;
                spinner.classList.add('d-none');
            }
        });

        // ── Job status panel helpers ──────────────────────────────────────────
        let localPollTimer = null;

        function showJobRunning(user) {
            document.getElementById('jobStatusPanel').style.display = '';
            document.getElementById('jobStatusIcon').innerHTML =
                '<span class="spinner-border spinner-border-sm text-warning"></span>';
            document.getElementById('jobStatusTitle').textContent = 'Import läuft…';
            document.getElementById('jobStatusUser').textContent  = user;
            document.getElementById('jobStatusBody').innerHTML    =
                '<p class="text-muted mb-0">' +
                '<i class="bi bi-info-circle"></i> ' +
                'Der Import läuft im Hintergrund. Du erhältst eine Benachrichtigung im ' +
                '<i class="bi bi-person-circle"></i> User-Menü wenn er abgeschlossen ist.</p>';
        }

        function showJobDone(user, data) {
            document.getElementById('jobStatusPanel').style.display = '';
            document.getElementById('jobStatusIcon').innerHTML =
                '<i class="bi bi-check-circle-fill text-success fs-5"></i>';
            document.getElementById('jobStatusTitle').textContent = 'Import abgeschlossen';
            document.getElementById('jobStatusUser').textContent  = user;

            let html =
                '<div class="row text-center g-3">' +
                stat(data.cardsCount,    'Karten gesamt') +
                stat(data.newCardsCount, 'Neue Karten',  '#28a745') +
                stat(data.addedCount,    'Hinzugefügt',  '#28a745') +
                stat(data.removedCount,  'Entfernt',     '#e94560') +
                '</div>';

            // Duplicate-rows warning block
            if (data.duplicatesRemoved && data.duplicatesRemoved.length > 0) {
                html += '<div class="alert alert-warning mt-3 mb-0 p-2">' +
                    '<strong>&#9888; ' + data.duplicatesRemoved.length + ' exakte Duplikat-Zeile(n) entfernt</strong>' +
                    '<ul class="mb-0 mt-1 small">';
                data.duplicatesRemoved.forEach(d => {
                    html += '<li>' + escHtml(d.cardName) + ' (' + escHtml(d.setCode.toUpperCase()) +
                        (d.foil ? ', Foil' : '') + ')' +
                        (d.folder ? ' — ' + escHtml(d.folder) : '') +
                        ' &times;' + d.occurrences + ' entfernt</li>';
                });
                html += '</ul></div>';
            }

            // Unknown set codes warning block
            if (data.unknownSetCodes && data.unknownSetCodes.length > 0) {
                html += '<div class="mt-2 mb-0 p-2 rounded" style="background:rgba(255,193,7,0.1);border:1px solid #ffc107;">' +
                    '<strong style="color:#ffc107;">&#9888; ' + data.unknownSetCodes.length + ' unbekannte Set-Code(s)</strong>' +
                    '<ul class="mb-0 mt-1 small" style="color:#ffd966;">';
                data.unknownSetCodes.forEach(entry => {
                    html += '<li><strong style="color:#ffc107;">' + escHtml(entry.setCode.toUpperCase()) + '</strong>' +
                        ' — kein Scryfall-Eintrag gefunden';
                    if (entry.cardNames && entry.cardNames.length > 0) {
                        const shown = entry.cardNames.slice(0, 8);
                        const rest  = entry.cardNames.length - shown.length;
                        html += '<br><span style="color:#aaa;font-size:0.8rem;">'
                            + shown.map(escHtml).join(', ');
                        if (rest > 0) html += ' <em>+' + rest + ' weitere</em>';
                        html += '</span>';
                    }
                    html += '</li>';
                });
                html += '</ul></div>';
            }

            html += '<div class="mt-3"><a href="/import/history" class="btn btn-sm btn-outline-light">' +
                '<i class="bi bi-clock-history"></i> Import-Verlauf anzeigen</a></div>';

            document.getElementById('jobStatusBody').innerHTML = html;
        }

        function showJobError(user, message) {
            document.getElementById('jobStatusPanel').style.display = '';
            document.getElementById('jobStatusIcon').innerHTML =
                '<i class="bi bi-x-circle-fill text-danger fs-5"></i>';
            document.getElementById('jobStatusTitle').textContent = 'Import fehlgeschlagen';
            document.getElementById('jobStatusUser').textContent  = user;
            document.getElementById('jobStatusBody').innerHTML    =
                '<p class="text-danger mb-0"><i class="bi bi-exclamation-triangle"></i> ' +
                (message || 'Unbekannter Fehler') + '</p>';
        }

        function stat(value, label, color) {
            return '<div class="col-6 col-md-3">' +
                '<div style="font-size:1.8rem;font-weight:bold;color:' + (color || '#e94560') + '">' + value + '</div>' +
                '<div style="color:#888;font-size:0.85rem">' + label + '</div>' +
                '</div>';
        }

        function escHtml(s) {
            return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
        }

        function startLocalPoll(jobId, user) {
            if (localPollTimer) clearInterval(localPollTimer);
            localPollTimer = setInterval(async () => {
                try {
                    const resp = await fetch('/api/import/status/' + jobId);
                    if (!resp.ok) return;
                    const data = await resp.json();
                    if (data.state === 'DONE') {
                        clearInterval(localPollTimer);
                        showJobDone(user, data);
                    } else if (data.state === 'ERROR') {
                        clearInterval(localPollTimer);
                        showJobError(user, data.errorMessage);
                    }
                } catch (_) { /* ignore */ }
            }, 3000);
        }

        function restoreJobStatus() {
            try {
                const raw = localStorage.getItem('navImportJob');
                if (!raw) return;
                const { jobId, user } = JSON.parse(raw);
                if (!jobId) return;
                fetch('/api/import/status/' + jobId).then(r => r.ok ? r.json() : null).then(data => {
                    if (!data) return;
                    if (data.state === 'RUNNING') {
                        showJobRunning(user);
                        startLocalPoll(jobId, user);
                    } else if (data.state === 'DONE') {
                        showJobDone(user, data);
                    } else if (data.state === 'ERROR') {
                        showJobError(user, data.errorMessage);
                    }
                });
            } catch (_) { /* ignore */ }
        }
    </script>
</body>
</html>
