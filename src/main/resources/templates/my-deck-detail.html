<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${deck != null ? deck.name + ' – My Decks' : 'Deck Detail – MTG'}">Deck Detail – MTG</title>
    <link th:href="@{/webjars/bootstrap/5.3.2/css/bootstrap.min.css}" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        :root { --primary-color: #1a1a2e; --secondary-color: #16213e; --accent-color: #e94560; --text-light: #f1f1f1; }
        body { background-color: #0f0f23; color: var(--text-light); min-height: 100vh; }
        .navbar { background-color: var(--primary-color) !important; }
        .navbar-brand { font-weight: bold; color: var(--accent-color) !important; }
        .nav-link { color: var(--text-light) !important; }
        .nav-link.active { color: var(--accent-color) !important; border-bottom: 2px solid var(--accent-color); }
        .card { background-color: var(--secondary-color); border: 1px solid #2a2a4a; color: var(--text-light); }
        footer { background-color: var(--primary-color); color: #888; }

        /* Summary stat blocks */
        .stat-block { text-align: center; padding: 0.7rem 1.2rem;
                      background: var(--secondary-color); border: 1px solid #2a2a4a; border-radius: 8px; }
        .stat-val   { font-size: 1.4rem; font-weight: bold; color: var(--accent-color); }
        .stat-label { font-size: 0.68rem; color: #888; text-transform: uppercase; letter-spacing: 0.5px; }

        /* Board section heading */
        .board-title { font-size: 0.7rem; font-weight: bold; letter-spacing: 1px;
                       text-transform: uppercase; color: #666; margin: 1rem 0 5px; }

        /* Two-column card list using CSS columns */
        .card-columns { columns: 2; column-gap: 1.5rem; column-rule: 1px solid #1e1e3a; }
        @media (max-width: 640px) { .card-columns { columns: 1; } }

        .card-entry {
            break-inside: avoid;
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 3px 4px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.84rem;
        }
        .card-entry:hover { background: rgba(255,255,255,0.05); }

        /* Small thumbnail */
        .entry-thumb    { flex-shrink: 0; width: 34px; height: 47px; object-fit: cover;
                          border-radius: 3px; display: block; }
        .entry-thumb-ph { flex-shrink: 0; width: 34px; height: 47px; background: #2a2a4a;
                          border-radius: 3px; }

        .entry-qty   { flex-shrink: 0; width: 16px; text-align: right;
                       font-weight: bold; color: #aaa; font-size: 0.8rem; }
        .entry-name  { flex: 1; overflow: hidden; white-space: nowrap; text-overflow: ellipsis; }
        .entry-set   { flex-shrink: 0; }
        .set-icon-sm { width: 12px; height: 12px; filter: invert(50%); }
        .entry-price { flex-shrink: 0; font-size: 0.77rem; color: #888; min-width: 44px; text-align: right; }

        .badge-foil { background: linear-gradient(135deg,#b06c24,#e8c95a); color: #111;
                      font-size: 0.58rem; padding: 1px 3px; border-radius: 3px; }
        .badge-commander { background-color: #7b2fff; }
        .badge-normal    { background-color: #1a6b4a; }

        /* Hover card preview */
        #card-preview { display: none; position: fixed; z-index: 9999; pointer-events: none; }
        #card-preview img { width: 240px; border-radius: 11px; box-shadow: 0 8px 36px rgba(0,0,0,.9); }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark" th:replace="~{fragments/nav :: main-nav}"></nav>
    <div th:replace="~{fragments/nav :: price-update-utils}"></div>

    <main class="container py-4">

        <!-- Back + title -->
        <div class="d-flex align-items-center gap-3 mb-3 flex-wrap">
            <a th:href="@{/my-decks(user=${user})}" class="btn btn-sm btn-outline-secondary">
                <i class="bi bi-arrow-left"></i> My Decks
            </a>
            <div th:if="${deck != null}" class="d-flex align-items-center gap-2 flex-wrap">
                <h2 class="mb-0" th:text="${deck.name}">Deck Name</h2>
                <span class="badge badge-commander" th:if="${deck.commander}">Commander</span>
                <span class="badge badge-normal"    th:unless="${deck.commander}">Normal</span>
                <span class="text-muted small"
                      th:if="${deck.updatedAt != null}"
                      th:text="'Updated ' + ${#temporals.format(deck.updatedAt, 'dd.MM.yyyy')}"></span>
            </div>
        </div>

        <div th:if="${error != null}" class="alert alert-danger" th:text="${error}"></div>

        <div th:if="${deck != null}">

            <!-- Summary stats -->
            <div class="d-flex gap-3 mb-4 flex-wrap">
                <div class="stat-block">
                    <div class="stat-val" th:text="${deck.mainboardCount}">0</div>
                    <div class="stat-label">Mainboard</div>
                </div>
                <div class="stat-block" th:if="${deck.sideboardCount > 0}">
                    <div class="stat-val" th:text="${deck.sideboardCount}">0</div>
                    <div class="stat-label">Sideboard</div>
                </div>
                <div class="stat-block" th:if="${deck.extraboardCount > 0}">
                    <div class="stat-val" th:text="${deck.extraboardCount}">0</div>
                    <div class="stat-label">Extra Board</div>
                </div>
                <div class="stat-block">
                    <div class="stat-val"
                         th:if="${deck.totalValue > 0}"
                         th:text="'&euro; ' + ${#numbers.formatDecimal(deck.totalValue, 1, 2)}">€ 0</div>
                    <div class="stat-val text-muted small" th:unless="${deck.totalValue > 0}">—</div>
                    <div class="stat-label">Est. Value</div>
                </div>
            </div>

            <!-- Mainboard -->
            <div th:if="${!deck.mainboard.isEmpty()}">
                <div class="board-title">Mainboard &middot; <span th:text="${deck.mainboardCount}">0</span> cards</div>
                <div class="card p-2">
                    <div class="card-columns">
                        <div th:each="c : ${deck.mainboard}" class="card-entry"
                             th:data-img="${c.effectiveImageUrl}" th:data-thumb="${c.effectiveThumbnailUrl}">
                            <img th:if="${c.effectiveThumbnailUrl != null}" th:src="${c.effectiveThumbnailUrl}"
                                 class="entry-thumb" th:alt="${c.name}"
                                 onerror="this.style.display='none';this.nextElementSibling.style.display='block';">
                            <div class="entry-thumb-ph" th:style="${c.effectiveThumbnailUrl != null} ? 'display:none' : ''"></div>
                            <span class="entry-qty" th:text="${c.quantity}">1</span>
                            <span class="entry-name">
                                <span th:text="${c.name}">Card Name</span>
                                <span th:if="${c.foil}" class="badge-foil">F</span>
                            </span>
                            <span class="entry-set">
                                <img th:src="${'https://svgs.scryfall.io/sets/' + c.setCode + '.svg'}"
                                     class="set-icon-sm" alt="" onerror="this.style.display='none'">
                            </span>
                            <span class="entry-price"
                                  th:text="${c.price > 0 ? '&euro; ' + #numbers.formatDecimal(c.price, 1, 2) : '&mdash;'}">—</span>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Sideboard -->
            <div th:if="${!deck.sideboard.isEmpty()}">
                <div class="board-title">Sideboard &middot; <span th:text="${deck.sideboardCount}">0</span> cards</div>
                <div class="card p-2">
                    <div class="card-columns">
                        <div th:each="c : ${deck.sideboard}" class="card-entry"
                             th:data-img="${c.effectiveImageUrl}" th:data-thumb="${c.effectiveThumbnailUrl}">
                            <img th:if="${c.effectiveThumbnailUrl != null}" th:src="${c.effectiveThumbnailUrl}"
                                 class="entry-thumb" th:alt="${c.name}"
                                 onerror="this.style.display='none';this.nextElementSibling.style.display='block';">
                            <div class="entry-thumb-ph" th:style="${c.effectiveThumbnailUrl != null} ? 'display:none' : ''"></div>
                            <span class="entry-qty" th:text="${c.quantity}">1</span>
                            <span class="entry-name">
                                <span th:text="${c.name}">Card Name</span>
                                <span th:if="${c.foil}" class="badge-foil">F</span>
                            </span>
                            <span class="entry-set">
                                <img th:src="${'https://svgs.scryfall.io/sets/' + c.setCode + '.svg'}"
                                     class="set-icon-sm" alt="" onerror="this.style.display='none'">
                            </span>
                            <span class="entry-price"
                                  th:text="${c.price > 0 ? '&euro; ' + #numbers.formatDecimal(c.price, 1, 2) : '&mdash;'}">—</span>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Extra Board -->
            <div th:if="${!deck.extraboard.isEmpty()}">
                <div class="board-title">Extra Board &middot; <span th:text="${deck.extraboardCount}">0</span> cards</div>
                <div class="card p-2">
                    <div class="card-columns">
                        <div th:each="c : ${deck.extraboard}" class="card-entry"
                             th:data-img="${c.effectiveImageUrl}" th:data-thumb="${c.effectiveThumbnailUrl}">
                            <img th:if="${c.effectiveThumbnailUrl != null}" th:src="${c.effectiveThumbnailUrl}"
                                 class="entry-thumb" th:alt="${c.name}"
                                 onerror="this.style.display='none';this.nextElementSibling.style.display='block';">
                            <div class="entry-thumb-ph" th:style="${c.effectiveThumbnailUrl != null} ? 'display:none' : ''"></div>
                            <span class="entry-qty" th:text="${c.quantity}">1</span>
                            <span class="entry-name">
                                <span th:text="${c.name}">Card Name</span>
                                <span th:if="${c.foil}" class="badge-foil">F</span>
                            </span>
                            <span class="entry-set">
                                <img th:src="${'https://svgs.scryfall.io/sets/' + c.setCode + '.svg'}"
                                     class="set-icon-sm" alt="" onerror="this.style.display='none'">
                            </span>
                            <span class="entry-price"
                                  th:text="${c.price > 0 ? '&euro; ' + #numbers.formatDecimal(c.price, 1, 2) : '&mdash;'}">—</span>
                        </div>
                    </div>
                </div>
            </div>

        </div><!-- /deck != null -->
    </main>

    <footer class="text-center py-3 mt-4"><p>MTG Collection Manager</p></footer>

    <!-- Hover card preview -->
    <div id="card-preview"><img src="" alt="Card Preview"></div>

    <script th:src="@{/webjars/bootstrap/5.3.2/js/bootstrap.bundle.min.js}"></script>
    <script>
        const preview    = document.getElementById('card-preview');
        const previewImg = preview.querySelector('img');

        document.querySelectorAll('.card-entry[data-img]').forEach(entry => {
            const img = entry.dataset.img || entry.dataset.thumb;
            if (!img) return;
            entry.addEventListener('mouseenter', e => {
                previewImg.src = img;
                preview.style.display = 'block';
                movePreview(e);
            });
            entry.addEventListener('mousemove', movePreview);
            entry.addEventListener('mouseleave', () => { preview.style.display = 'none'; });
        });

        function movePreview(e) {
            const off = 18;
            let x = e.clientX + off, y = e.clientY - 120;
            if (x + 258 > window.innerWidth)  x = e.clientX - 258 - off;
            if (y < 10) y = 10;
            if (y + 340 > window.innerHeight) y = window.innerHeight - 340;
            preview.style.left = x + 'px';
            preview.style.top  = y + 'px';
        }
    </script>
</body>
</html>
