<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Decks - MTG</title>
    <link th:href="@{/webjars/bootstrap/5.3.2/css/bootstrap.min.css}" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        :root { --primary-color: #1a1a2e; --secondary-color: #16213e; --accent-color: #e94560; --text-light: #f1f1f1; }
        body { background-color: #0f0f23; color: var(--text-light); min-height: 100vh; }
        .navbar { background-color: var(--primary-color) !important; }
        .navbar-brand { font-weight: bold; color: var(--accent-color) !important; }
        .nav-link { color: var(--text-light) !important; }
        .nav-link.active { color: var(--accent-color) !important; border-bottom: 2px solid var(--accent-color); }
        .card { background-color: var(--secondary-color); border: 1px solid #2a2a4a; color: var(--text-light); }
        footer { background-color: var(--primary-color); color: #888; }

        /* ── Deck grid ── */
        .deck-grid { display: flex; flex-wrap: wrap; gap: 18px; }

        .deck-box {
            width: 200px;
            border-radius: 10px;
            overflow: hidden;
            background: var(--secondary-color);
            border: 1px solid #2a2a4a;
            text-decoration: none;
            color: inherit;
            display: flex;
            flex-direction: column;
            transition: transform 0.15s, box-shadow 0.15s, border-color 0.15s;
            cursor: pointer;
        }
        .deck-box:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 28px rgba(0,0,0,.7);
            border-color: var(--accent-color);
            color: inherit;
        }
        .deck-cover {
            width: 100%;
            height: 130px;
            overflow: hidden;
            background: #12122a;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .deck-cover img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: center top;
            display: block;
        }
        .deck-cover-placeholder { font-size: 2.5rem; color: #2a2a4a; }
        .deck-info { padding: 10px 12px 12px; flex: 1; display: flex; flex-direction: column; gap: 5px; }
        .deck-box-name {
            font-size: 0.88rem; font-weight: bold; line-height: 1.2;
            overflow: hidden; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
        }
        .deck-box-meta { display: flex; align-items: center; gap: 5px; flex-wrap: wrap; font-size: 0.72rem; color: #888; }
        .badge-commander { background-color: #7b2fff; font-size: 0.65rem; }
        .badge-normal    { background-color: #1a6b4a; font-size: 0.65rem; }
        .deck-box-value { font-size: 0.95rem; font-weight: bold; color: var(--accent-color); margin-top: auto; }
        .deck-box-value.no-price { color: #555; font-size: 0.75rem; font-weight: normal; }

        .empty-state { text-align: center; padding: 4rem 1rem; color: #666; }
        .empty-state i { font-size: 3rem; display: block; margin-bottom: 1rem; }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark" th:replace="~{fragments/nav :: main-nav}"></nav>
    <div th:replace="~{fragments/nav :: price-update-utils}"></div>

    <main class="container-fluid py-4">
        <div class="d-flex align-items-center gap-3 mb-4">
            <h2 class="mb-0"><i class="bi bi-stack"></i> My Decks</h2>

            <!-- User selector -->
            <form method="get" action="/my-decks" class="d-flex align-items-center gap-2 ms-3">
                <select name="user" class="form-select form-select-sm" style="width:auto;" onchange="this.form.submit()">
                    <option value="Victor" th:selected="${user == 'Victor'}">Victor</option>
                    <option value="Andre"  th:selected="${user == 'Andre'}">Andre</option>
                </select>
            </form>

            <span class="badge bg-secondary ms-auto" th:text="${decks.size()} + ' Deck(s)'"></span>
        </div>

        <!-- Empty state -->
        <div th:if="${decks.isEmpty()}" class="empty-state">
            <i class="bi bi-collection"></i>
            <p>No decks found for <strong th:text="${user}"></strong>.</p>
            <p class="small text-muted">Import a DragonShield CSV with deck folders (e.g. <code>MB_Burn</code>, <code>MB_CM_Entfesselte Untote</code>) to detect decks automatically.</p>
        </div>

        <!-- Deck card grid -->
        <div class="deck-grid" th:if="${!decks.isEmpty()}">
            <a th:each="deck : ${decks}"
               class="deck-box"
               th:href="@{/my-decks/detail(id=${deck.id},user=${user})}">

                <!-- Cover art -->
                <div class="deck-cover">
                    <img th:if="${deck.coverImageUrl != null}"
                         th:src="${deck.coverImageUrl}" alt=""
                         onerror="this.style.display='none';this.nextElementSibling.style.display='flex';">
                    <div class="deck-cover-placeholder"
                         th:style="${deck.coverImageUrl != null} ? 'display:none' : ''">
                        <i class="bi bi-collection"></i>
                    </div>
                </div>

                <!-- Info -->
                <div class="deck-info">
                    <div class="deck-box-name" th:text="${deck.name}">Deck Name</div>
                    <div class="deck-box-meta">
                        <span class="badge badge-commander" th:if="${deck.commander}">Commander</span>
                        <span class="badge badge-normal" th:unless="${deck.commander}">Normal</span>
                        <span th:text="${deck.mainboardCount} + ' cards'"></span>
                    </div>
                    <div class="deck-box-value"
                         th:if="${deck.totalValue > 0}"
                         th:text="'&euro; ' + ${#numbers.formatDecimal(deck.totalValue, 1, 2)}"></div>
                    <div class="deck-box-value no-price"
                         th:unless="${deck.totalValue > 0}">no price data</div>
                </div>
            </a>
        </div>
    </main>

    <footer class="text-center py-3 mt-4"><p>MTG Collection Manager</p></footer>

    <script th:src="@{/webjars/bootstrap/5.3.2/js/bootstrap.bundle.min.js}"></script>
</body>
</html>
